<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Katalog Kedai Mya</title>
    <style>
        /* Style katalog seperti yang kita bahas sebelumnya */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; overflow: hidden; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .sold-out { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body>

<h1 style="text-align: center;">Menu Kedai Mya</h1>
<div class="grid" id="menu-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCxtwlN9d2eQxlhaMfcqFYy3HkzFhig-KY",
        authDomain: "kedai-mya.firebaseapp.com",
        projectId: "kedai-mya",
        storageBucket: "kedai-mya.firebasestorage.app",
        messagingSenderId: "614341456264",
        appId: "1:614341456264:web:c62db51f5135493f23ca3d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const q = query(collection(db, "menu_katalog"), orderBy("createdAt", "desc"));

    onSnapshot(q, (snapshot) => {
        const container = document.getElementById('menu-container');
        container.innerHTML = snapshot.docs.map(doc => {
            const item = doc.data();
            return `
                <div class="card ${item.stok == 0 ? 'sold-out' : ''}">
                    <img src="${item.img}">
                    <h3>${item.nama}</h3>
                    <p>Rp ${item.harga.toLocaleString()}</p>
                    <p>${item.stok == 0 ? 'HABIS' : 'Tersedia'}</p>
                </div>
            `;
        }).join('');
    });
</script>
</body>
</html>
